<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request Activity Form</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#F8F9FA", // User requested light grey #F8F9FA
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "1.75rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col overflow-hidden selection:bg-primary/20">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-12 pb-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white" style="font-size: 24px;">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-slate-900 dark:text-white tracking-tight">Request Activity</h1>
<div class="w-10"></div> <!-- Spacer for centering title -->
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto no-scrollbar px-6 pb-24">
<form class="flex flex-col gap-6 mt-2" onsubmit="event.preventDefault();">
<!-- Activity Category -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="category">Activity Category</label>
<div class="relative group">
<select class="w-full h-14 pl-5 pr-12 bg-white dark:bg-slate-800 border-none rounded-2xl shadow-soft text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 appearance-none cursor-pointer transition-all hover:shadow-md" id="category">
<option disabled="" selected="" value="">Select Category...</option>
<option value="rural">Rural Development</option>
<option value="nss">NSS</option>
<option value="technical">Technical</option>
<option value="social">Social Service</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Activity Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="activityName">Activity Name</label>
<div class="relative group">
<input class="w-full h-14 pl-5 pr-4 bg-white dark:bg-slate-800 border-none rounded-2xl shadow-soft text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all hover:shadow-md" id="activityName" placeholder="e.g., Tree Plantation Drive" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
</div>
</div>
</div>
<!-- Expected Points & Date Row -->
<div class="flex gap-4">
<!-- Expected Points -->
<div class="flex flex-col gap-2 flex-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="points">Points</label>
<div class="relative">
<input class="w-full h-14 pl-5 pr-4 bg-white dark:bg-slate-800 border-none rounded-2xl shadow-soft text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all hover:shadow-md" id="points" placeholder="20" type="number"/>
</div>
</div>
<!-- Date of Participation -->
<div class="flex flex-col gap-2 flex-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="date">Date</label>
<div class="relative group">
<input class="w-full h-14 pl-5 pr-10 bg-white dark:bg-slate-800 border-none rounded-2xl shadow-soft text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all hover:shadow-md [color-scheme:light] dark:[color-scheme:dark]" id="date" type="date"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400 group-hover:text-primary transition-colors">
<!-- Helper icon for browsers that don't show calendar icon by default inside input -->
</div>
</div>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="description">Description</label>
<textarea class="w-full p-5 bg-white dark:bg-slate-800 border-none rounded-2xl shadow-soft text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 resize-none transition-all hover:shadow-md" id="description" placeholder="Briefly describe the activity and your role..." rows="4"></textarea>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-14 bg-[#1A1A1A] dark:bg-white text-white dark:text-[#1A1A1A] font-semibold text-lg rounded-2xl shadow-lg shadow-black/10 hover:shadow-xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Submit Request</span>
<span class="material-symbols-outlined" style="font-size: 20px;">send</span>
</button>
</div>
</form>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-6 pb-6 pt-3 z-50">
<div class="flex justify-between items-end">
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">home</span>
</div>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors">Home</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="text-[#111418] dark:text-white flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full px-4 py-1">
<span class="material-symbols-outlined text-[24px] font-variation-settings-'FILL'1">list_alt</span>
</div>
<span class="text-[10px] font-medium text-[#111418] dark:text-white">Requests</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">check_circle</span>
</div>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors">Submissions</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">person</span>
</div>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors">Profile</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">settings</span>
</div>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary dark:group-hover:text-primary transition-colors">Settings</span>
</a>
</div>
</nav>
</body></html>
