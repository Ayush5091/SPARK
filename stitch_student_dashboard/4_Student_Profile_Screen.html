<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">

<style>

<div class="flex items-center p-4 bg-[#F8F9FA] dark:bg-[#2a2a2a] rounded-2xl shadow-sm transition-all hover:shadow-md">

</div>
<div class="ml-4 flex-1">

<div class="flex items-center p-4 bg-[#F8F9FA] dark:bg-[#2a2a2a] rounded-2xl shadow-sm transition-all hover:shadow-md">

<span class="material-symbols-outlined text-white/80 text-2xl">star</span>

<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary dark:hover:text-white transition-colors py-2" href="#">
<span class="material-symbols-outlined text-[26px]">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary dark:hover:text-white transition-colors py-2" href="#">
